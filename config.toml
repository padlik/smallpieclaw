# Telegram Home Agent Configuration

[telegram]
bot_token = "YOUR_TELEGRAM_BOT_TOKEN"
# Security mode: "allowlist" or "pairing"
security_mode = "allowlist"
# Comma-separated list of allowed Telegram user IDs (for allowlist mode)
allowed_user_ids = []
# Pairing timeout in seconds (for pairing mode)
pairing_timeout = 300

[llm]
# Provider: "openai", "openrouter", "google", "anthropic"
provider = "openai"
api_key = "YOUR_LLM_API_KEY"
model = "gpt-4o-mini"
base_url = "https://api.openai.com/v1"
max_tokens = 1024
temperature = 0.2

[embeddings]
# Use same provider as LLM or configure separately
provider = "openai"
api_key = "YOUR_EMBEDDINGS_API_KEY"
model = "text-embedding-3-small"
base_url = "https://api.openai.com/v1"

[agent]
max_iterations = 8
tool_timeout = 10
max_output_size = 4000
top_tools = 3

[scheduler]
enabled = true
# Cron-style: "HH:MM" for daily tasks
nightly_health_check = "02:00"
disk_check_interval_hours = 6

[paths]
tools_dir = "tools"
generated_tools_dir = "tools_generated"
data_dir = "data"
tool_index_file = "data/tool_index.json"
memory_file = "data/memory.json"
